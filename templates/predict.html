<!-- prediction.html -->
{% extends "base.html" %}
{% block body %}

<head>
  <meta charset="UTF-8">
  <title>Mental Health Prediction</title>
  <link href="/static/css/main.css" rel="stylesheet"> <!-- keep your existing CSS -->
</head>

<body>

  <div class="container" style="margin-top:100px; text-align:center;">

    <h2>Mental Health Prediction</h2>
    <p>Enter your thoughts and get your mental health status</p>

    <form action="/predict" method="post">

      <textarea name="user_input" rows="5" style="width:60%;" placeholder="Type your feelings here..." required></textarea>

      <br><br>

      <button type="submit">Predict</button>

    </form>

    {% if prediction %}
      <h3 style="margin-top:20px;">Result: {{ prediction }}</h3>
    {% endif %}

    <br>
    <a href="/">← Back to Home</a>

  </div>
{% endblock body %}
 <!-- Scroll Top -->
  <a href="#" id="scroll-top" class="scroll-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>

  <!-- Preloader -->
  <div id="preloader"></div>

  <!-- Vendor JS Files -->
  <script src="/static//vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="/static//vendor/php-email-form/validate.js"></script>
  <script src="/static/vendor/aos/aos.js"></script>
  <script src="/static/vendor/swiper/swiper-bundle.min.js"></script>
  <script src="/static/vendor/glightbox/js/glightbox.min.js"></script>

  <!-- Main JS File -->
  <script src="/static/js/main.js"></script>

</body>

</html>
